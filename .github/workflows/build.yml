name: Build wiliwili (aarch64)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Firmware target. rocknix = Mali-G31 (RockNIX); tg5040 = TrimUi TG5040 / PowerVR GE8300; both = build both.'
        required: false
        default: both
        type: choice
        options:
          - both
          - rocknix
          - tg5040
      release_tag:
        description: 'Release tag/name, e.g. v1.0.0. Leave empty for a nightly prerelease.'
        required: false
        default: ''

permissions:
  contents: write

env:
  WILIWILI_REPO: https://github.com/Windstarry/wiliwili.git
  WILIWILI_REF: yoga
  BUILD_MPV_FROM_SRC: 'on'
  IMAGE: ghcr.io/monkeyx-net/portmaster-build-templates/portmaster-builder:aarch64-latest
  WILIWILI_REF_TG5040: 88e5876bea9502d06f46a8656e3530684d3aaf7d

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    if: github.event.inputs.target == 'both' || github.event.inputs.target == matrix.target
    strategy:
      matrix:
        include:
          - target: rocknix
            runner: ubuntu-24.04-arm
          - target: tg5040
            runner: ubuntu-latest
    steps:
      - name: Checkout (port repo)
        uses: actions/checkout@v4

      - name: Clone wiliwili source (rocknix)
        if: matrix.target == 'rocknix'
        run: |
          git clone --recursive "$WILIWILI_REPO" src

      - name: Clone wiliwili source (tg5040)
        if: matrix.target == 'tg5040'
        run: |
          git clone --recursive "$WILIWILI_REPO" src && \
          git -C src checkout "$WILIWILI_REF_TG5040" && \
          git -C src submodule update --init --recursive

      - name: Build in container (rocknix / Mali-G31)
        if: matrix.target == 'rocknix'
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace \
            -e DEBIAN_FRONTEND=noninteractive -e SOURCE_DIR=/workspace/src \
            -e WILIWILI_REF="$WILIWILI_REF" \
            -e BUILD_MPV_FROM_SRC="$BUILD_MPV_FROM_SRC" \
            ${{ env.IMAGE }} /bin/bash -c "bash recipes/ports/wiliwili/build.sh aarch64"

      - name: Cross-build (tg5040 / PowerVR GE8300)
        if: matrix.target == 'tg5040'
        run: |
          sudo env TARGET=tg5040 SOURCE_DIR="$PWD/src" bash recipes/ports/wiliwili/build.sh aarch64

      - name: Assemble PortMaster port (tg5040 / TrimUi flat layout)
        if: matrix.target == 'tg5040'
        run: |
          rm -rf ports
          mkdir -p ports/wiliwili
          tar -xzf wiliwili-linux-aarch64.tar.gz -C ports/wiliwili/
          mv ports/wiliwili/libs ports/wiliwili/libs.aarch64
          # 保留一份 libs 以兼容个别固件
          cp -r ports/wiliwili/libs.aarch64 ports/wiliwili/libs
          cp recipes/ports/wiliwili/config.json ports/wiliwili/config.json
          cp recipes/ports/wiliwili/icon.png ports/wiliwili/icon.png
          cp recipes/ports/wiliwili/launch.sh ports/wiliwili/launch.sh
          chmod +x ports/wiliwili/launch.sh
          cd ports/wiliwili && zip -r ../../wiliwili-${{ matrix.target }}.zip .

      - name: Assemble PortMaster port (rocknix / nested layout)
        if: matrix.target == 'rocknix'
        run: |
          rm -rf ports
          mkdir -p ports/wiliwili/wiliwili
          tar -xzf wiliwili-linux-aarch64.tar.gz -C ports/wiliwili/wiliwili/
          cp recipes/ports/wiliwili/port.json ports/wiliwili/wiliwili/port.json
          cp recipes/ports/wiliwili/wiliwili.sh ports/wiliwili/wiliwili.sh
          cp recipes/ports/wiliwili/wiliwili.png ports/wiliwili/wiliwili/wiliwili.png
          chmod +x ports/wiliwili/wiliwili.sh
          cd ports/wiliwili && zip -r ../../wiliwili-${{ matrix.target }}.zip .

      - name: Upload portmaster artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiliwili-${{ matrix.target }}
          path: wiliwili-${{ matrix.target }}.zip
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: wiliwili-*
          path: release
          merge-multiple: true
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || 'nightly' }}
          name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || 'Nightly Build' }}
          prerelease: ${{ github.event.inputs.release_tag == '' }}
          overwrite: true
          body: |
            Automated build from ${{ github.sha }}
            - Source ref: ${{ github.ref_name }}
            - Target: ${{ github.event.inputs.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

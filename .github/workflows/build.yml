name: Build wiliwili (aarch64)
on:
  # 仅手动触发（Actions 页 Run workflow）。不再因每次 push 自动编译/发布。
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag/name, e.g. v1.0.0. Leave empty for a nightly prerelease.'
        required: false
        default: ''
permissions:
  contents: write
env:
  # 源码仓库：默认拉取 wiliwili 源码（含子模块）。
  WILIWILI_REPO: https://github.com/Windstarry/wiliwili.git
  # 源码版本：钉死到 v1.6.0 发布提交 88e5876bea9502d06f46a8656e3530684d3aaf7d（2026-04-25）。
  #   浮动分支 yoga 可能解析到不一致的中间提交：cpp 已恒绑定 cell/windowFullscreen（init/hide 在
  #   setting_activity.cpp 的 #ifdef ALLOW_FULLSCREEN 块内），但对应 xml 尚未含该 BooleanCell，
  #   运行期 borealis 解析 XML 找不到视图 -> brls::ViewNotFoundException。钉死一致提交使构建可复现。
  WILIWILI_REF: 88e5876bea9502d06f46a8656e3530684d3aaf7d
  # 交叉构建目标：tg5040 = TrimUi TG5040 / Allwinner A133P + PowerVR GE8300
  #   （由 recipes/ports/wiliwili/build.sh 读取 TARGET 分发到 build_tg5040 路径）
  TARGET: tg5040
jobs:
  build:
    name: Build & Package PortMaster
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (port repo)
        uses: actions/checkout@v4
      - name: Clone wiliwili source (with submodules)
        run: |
          git clone --recursive "$WILIWILI_REPO" src && git -C src checkout "$WILIWILI_REF" && git -C src submodule update --init --recursive
      - name: Cross-build (tg5040 / PowerVR GE8300)
        run: |
          sudo env TARGET=tg5040 SOURCE_DIR="$PWD/src" bash recipes/ports/wiliwili/build.sh aarch64
      - name: Assemble PortMaster port
        run: |
          # 目录结构：wiliwili-portmaster/  (zip 根)
          #   ├── wiliwili.sh          (启动器，置于内层 wiliwili/ 之外)
          #   └── wiliwili/            (内层目录)
          #       ├── wiliwili         (二进制)
          #       ├── libs/            (运行时库)
          #       ├── port.json
          #       └── wiliwili.png     (图标，置于内层 wiliwili/ 之内)
          mkdir -p ports/wiliwili/wiliwili
          tar -xzf wiliwili-linux-aarch64.tar.gz -C ports/wiliwili/wiliwili/
          cp recipes/ports/wiliwili/port.json ports/wiliwili/wiliwili/port.json
          cp recipes/ports/wiliwili/wiliwili.sh ports/wiliwili/wiliwili.sh
          cp recipes/ports/wiliwili/wiliwili.png ports/wiliwili/wiliwili/wiliwili.png
          chmod +x ports/wiliwili/wiliwili.sh
          cd ports/wiliwili && zip -r ../../wiliwili.zip .
      - name: Upload portmaster artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiliwili-portmaster
          path: wiliwili.zip
          retention-days: 7
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wiliwili-portmaster
          path: release
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/wiliwili.zip
          # 手动输入 release_tag -> 以该名为正式 Release；留空 -> 覆盖式 nightly prerelease
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || 'nightly' }}
          name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || 'Nightly Build' }}
          prerelease: ${{ github.event.inputs.release_tag == '' }}
          overwrite: true
          body: |
            Automated build from ${{ github.sha }}
            - Source ref: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

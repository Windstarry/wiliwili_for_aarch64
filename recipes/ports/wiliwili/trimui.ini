[built-in options]
prefix = '/usr'
buildtype = 'release'
default_library = 'static'
c_args = ['--sysroot=/opt/trimui/sysroot']
cpp_args = ['--sysroot=/opt/trimui/sysroot']
c_link_args = ['--sysroot=/opt/trimui/sysroot']
cpp_link_args = ['--sysroot=/opt/trimui/sysroot']

[binaries]
c = 'aarch64-linux-gnu-gcc'
cpp = 'aarch64-linux-gnu-g++'
ar = 'aarch64-linux-gnu-ar'
nm = 'aarch64-linux-gnu-nm'
strip = 'aarch64-linux-gnu-strip'
exe_wrapper = 'binfmt'
pkgconfig = 'pkg-config'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'arm64'
endian = 'little'